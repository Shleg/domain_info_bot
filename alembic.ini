[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Overridden by db/db.py migration runner and alembic/env.py from config.DB_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]


[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
